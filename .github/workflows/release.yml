name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Get version
        id: info
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          echo "prev_tag=${PREV_TAG:-none}" >> $GITHUB_OUTPUT

          # 生成提交日志
          {
            echo "## Commits"
            echo ""
            if [ "$PREV_TAG" != "" ]; then
              echo "Changes from ${PREV_TAG} to v${{ steps.info.outputs.version }}"
            else
              echo "All changes since first commit"
            fi
            echo ""
            git log ${RANGE} --pretty=format:"- %h %s (%an)" --no-merges
          } > changelog.md

      - name: Build
        run: |
          PLATFORMS=(
            "darwin/arm64"
            "darwin/amd64"
            "linux/arm64"
            "linux/amd64"
            "windows/amd64"
          )

          mkdir -p dist
          for PLATFORM in "${PLATFORMS[@]}"; do
            IFS='/' read -r GOOS GOARCH <<< "$PLATFORM"
            OUTPUT="dist/go-proxy-${GOOS}-${GOARCH}"
            [ "$GOOS" = "windows" ] && OUTPUT="${OUTPUT}.exe"

            echo "Building ${GOOS}/${GOARCH} ..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -ldflags="-s -w" -o "$OUTPUT" ./cmd/go-proxy/
          done

          echo ""
          echo "Build results:"
          ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.info.outputs.version }} (${{ steps.info.outputs.date }})"
          body_path: changelog.md
          draft: false
          prerelease: false
          files: dist/*
